name: Agent Eval CI

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'evals/**'
      - 'models.yaml'
      - 'agentmodelctl.yaml'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install agentmodelctl
        run: pip install agentmodelctl

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          agentmodelctl ci --ref origin/${{ github.base_ref }} --format markdown > eval-results.md

      - name: Comment on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: eval-results.md
